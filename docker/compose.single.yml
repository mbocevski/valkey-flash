services:
  valkey-flash:
    image: valkey-flash:dev
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "6379:6379"
    volumes:
      - flash_data:/var/lib/valkey-flash
      - valkey_data:/data
    environment:
      FLASH_PATH: /var/lib/valkey-flash/flash.bin
      FLASH_CAPACITY_BYTES: "67108864"   # 64 MiB — small default suitable for tests
      FLASH_CACHE_SIZE_BYTES: ""
      FLASH_SYNC: everysec
      FLASH_IO_THREADS: ""
      FLASH_IO_URING_ENTRIES: ""
      FLASH_COMPACTION_INTERVAL_SEC: ""
    # Tight seccomp profile: Docker default + io_uring_{setup,enter,register}.
    # For quick-start without the profile, overlay with compose.single.dev.yml.
    security_opt:
      - seccomp:./seccomp-flash.json
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  flash_data:
  valkey_data:
