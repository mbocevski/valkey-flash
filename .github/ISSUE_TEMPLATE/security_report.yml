name: Security vulnerability
description: Report a security issue — please read before filing
body:
  - type: markdown
    attributes:
      value: |
        **Do not file security vulnerabilities as public issues.**

        Report them privately via [GitHub Security Advisories](https://github.com/mbocevski/valkey-flash/security/advisories/new).
        Your report will be reviewed by maintainers without public disclosure until a fix is ready.
