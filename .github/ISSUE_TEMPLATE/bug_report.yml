name: Bug report
description: Report a bug in valkey-flash
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        **Security issue?** Do not file a public bug. Use [GitHub Security Advisories](https://github.com/valkey-io/valkey-flash/security/advisories/new) instead.

  - type: input
    id: valkey_version
    attributes:
      label: Valkey version
      placeholder: "e.g. 8.1.1"
    validations:
      required: true

  - type: input
    id: module_version
    attributes:
      label: valkey-flash version / commit
      placeholder: "e.g. v0.3.0 or git SHA"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / platform
      placeholder: "e.g. Ubuntu 24.04 x86_64, macOS 15 arm64"
    validations:
      required: true

  - type: input
    id: kernel_version
    attributes:
      label: Linux kernel version (if applicable)
      description: Run `uname -r` and paste the output. Required for io_uring-related bugs.
      placeholder: "e.g. 6.8.0-45-generic"

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Load module with ...
        2. Run command ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: text
