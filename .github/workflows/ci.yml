name: ci

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  VALKEY_REPO_URL: https://github.com/valkey-io/valkey.git
  TEST_FRAMEWORK_REPO: https://github.com/valkey-io/valkey-test-framework
  TEST_FRAMEWORK_DIR: tests/build/valkeytestframework

jobs:
  build-ubuntu:
    name: Ubuntu / Valkey ${{ matrix.server_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        server_version: ['unstable', '8.0', '8.1']
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
    - name: Set server version
      run: echo "SERVER_VERSION=${{ matrix.server_version }}" >> $GITHUB_ENV
    - name: Cargo fmt and clippy
      run: |
        cargo fmt --check
        cargo clippy --profile release --all-targets -- -D warnings
    - name: Unit tests
      run: cargo test --features enable-system-alloc
    - name: Release build
      run: |
        if [ "${{ matrix.server_version }}" = "8.0" ]; then
          RUSTFLAGS="-D warnings" cargo build --all --all-targets --release --features valkey_8_0
        else
          RUSTFLAGS="-D warnings" cargo build --all --all-targets --release
        fi
    - name: Build valkey-server
      run: |
        mkdir -p "tests/build/binaries/${{ matrix.server_version }}"
        cd tests/build
        git clone "${{ env.VALKEY_REPO_URL }}"
        cd valkey
        git checkout ${{ matrix.server_version }}
        make -j
        cp src/valkey-server ../binaries/${{ matrix.server_version }}/
        if [ -f src/modules/lua/libvalkeylua.so ]; then
          cp src/modules/lua/libvalkeylua.so ../binaries/${{ matrix.server_version }}/
        fi
    - name: Set up test framework
      run: |
        git clone ${{ env.TEST_FRAMEWORK_REPO }}
        mkdir -p ${{ env.TEST_FRAMEWORK_DIR }}
        mv valkey-test-framework/src/* ${{ env.TEST_FRAMEWORK_DIR }}/
        rm -rf valkey-test-framework
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      with:
        python-version: '3.11'
    - name: Install test dependencies
      run: pip install -r requirements.txt
    - name: Set module path
      run: echo "MODULE_PATH=$(realpath target/release/libvalkey_flash.so)" >> $GITHUB_ENV
    - name: Run integration tests
      run: python -m pytest --cache-clear -v tests/

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
    - name: Install cargo-llvm-cov
      run: cargo install --version =0.8.5 --locked cargo-llvm-cov
    - name: Generate lcov report
      run: |
        cargo llvm-cov \
          --lcov \
          --output-path lcov.info \
          --features enable-system-alloc \
          --ignore-filename-regex 'src/wrapper/'
    - name: Upload to Codecov
      uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe  # v5
      with:
        files: lcov.info
        fail_ci_if_error: false

  build-macos:
    name: macOS / Rust checks
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
    - name: Cargo fmt and clippy
      run: |
        cargo fmt --check
        cargo clippy --profile release --all-targets -- -D warnings
    - name: Unit tests
      run: cargo test --features enable-system-alloc
