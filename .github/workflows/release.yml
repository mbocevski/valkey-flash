name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

env:
  CARGO_TERM_COLOR: always

jobs:

  # ── 1. Validate signed tag and Cargo.toml version ──────────────────────────

  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      with:
        fetch-depth: 0  # full history needed for git verify-tag

    - name: Import GPG public key
      run: echo "${{ secrets.GPG_PUBLIC_KEY }}" | gpg --batch --yes --import
      env:
        GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}

    - name: Verify tag has a valid GPG signature
      run: |
        git verify-tag "${{ github.ref_name }}" || {
          echo "::error::Tag ${{ github.ref_name }} is not GPG-signed or signature cannot be verified."
          echo "::error::Create signed tags with: git tag -s ${{ github.ref_name }} -m '...'"
          exit 1
        }
        echo "GPG signature verified for ${{ github.ref_name }}"

    - name: Verify Cargo.toml version matches tag
      run: |
        tag_ver="${{ github.ref_name }}"
        tag_ver="${tag_ver#v}"   # strip leading 'v'
        cargo_ver=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= "\(.*\)"/\1/')
        if [ "$tag_ver" != "$cargo_ver" ]; then
          echo "::error::Cargo.toml version ($cargo_ver) does not match tag (${{ github.ref_name }})."
          echo "::error::Update [package].version to $tag_ver in Cargo.toml before tagging."
          exit 1
        fi
        echo "Cargo.toml version $cargo_ver matches tag ${{ github.ref_name }}"

  # ── 2. Build platform .so / .dylib artifacts ───────────────────────────────

  build-so:
    name: Build / ${{ matrix.artifact }}
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: libvalkey_flash-linux-x86_64.so
            lib_name: libvalkey_flash.so

          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: libvalkey_flash-linux-aarch64.so
            lib_name: libvalkey_flash.so
            cross_compile: true

          - target: aarch64-apple-darwin
            runner: macos-14
            artifact: libvalkey_flash-macos-arm64.dylib
            lib_name: libvalkey_flash.dylib

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Cache Cargo registry
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.toml') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.target }}-cargo-

    - name: Install aarch64-linux cross-compile toolchain
      if: matrix.cross_compile == true
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu
        rustup target add aarch64-unknown-linux-gnu

    - name: Add macOS arm64 target
      if: matrix.target == 'aarch64-apple-darwin'
      run: rustup target add aarch64-apple-darwin

    - name: Build release .so / .dylib
      env:
        RUSTFLAGS: "-D warnings"
        # Linker for aarch64 Linux cross-compile; empty string for other targets
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross_compile == true && 'aarch64-linux-gnu-gcc' || '' }}
      run: cargo build --release --target ${{ matrix.target }}

    - name: Stage artifact with platform suffix
      run: |
        cp "target/${{ matrix.target }}/release/${{ matrix.lib_name }}" \
           "${{ matrix.artifact }}"

    - name: Upload build artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
      with:
        name: ${{ matrix.artifact }}
        path: ${{ matrix.artifact }}
        retention-days: 7

  # ── 3. Create GitHub Release + push Docker image ───────────────────────────

  release:
    name: Publish release
    needs: build-so
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub release
      packages: write   # push to GHCR

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      with:
        fetch-depth: 0  # full history for release notes

    - name: Download all .so / .dylib artifacts
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
      with:
        path: dist/
        merge-multiple: true   # flatten into dist/ instead of per-artifact dirs

    - name: List staged artifacts
      run: ls -lh dist/

    - name: Generate release notes
      run: python3 scripts/release-notes.py "${{ github.ref_name }}" > release-notes.md && cat release-notes.md

    - name: Create GitHub Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        prerelease_flag=""
        # Tags with a pre-release segment (e.g. v1.0.0-rc.1, v1.0.0-rc.dryrun)
        # are published as pre-releases and do not update :latest or :N Docker tags
        [[ "${{ github.ref_name }}" == *-* ]] && prerelease_flag="--prerelease"

        gh release create "${{ github.ref_name }}" \
          --title "valkey-flash ${{ github.ref_name }}" \
          --notes-file release-notes.md \
          $prerelease_flag \
          dist/*

    - name: Set up QEMU for multi-arch Docker builds
      run: docker run --privileged --rm tonistiigi/binfmt --install all

    - name: Set up Docker Buildx
      run: |
        docker buildx create --name release-builder \
          --driver docker-container --use --bootstrap
        docker buildx inspect

    - name: Log in to GHCR
      run: |
        echo "${{ secrets.GITHUB_TOKEN }}" \
          | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

    - name: Compute Docker tags
      id: docker-tags
      run: |
        tag="${{ github.ref_name }}"
        version="${tag#v}"       # strip leading 'v'
        major="${version%%.*}"   # e.g. 1.0.0 → 1
        base="ghcr.io/${{ github.repository }}"

        # version tag is always pushed (e.g. 1.0.0 or 1.0.0-rc.1)
        tags="${base}:${version}"

        # major and latest tags only for stable releases (no pre-release segment)
        if [[ "${version}" != *"-"* ]]; then
          tags="${tags},${base}:${major},${base}:latest"
        fi

        echo "tags=${tags}" >> $GITHUB_OUTPUT
        echo "Docker tags: ${tags}"

    - name: Build and push multi-arch Docker image
      run: |
        docker buildx build \
          --platform linux/amd64,linux/arm64 \
          --file docker/Dockerfile \
          $(echo "${{ steps.docker-tags.outputs.tags }}" \
            | tr ',' '\n' | sed 's/^/--tag /') \
          --push \
          .
