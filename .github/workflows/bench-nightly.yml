name: bench-nightly

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  VALKEY_REPO_URL: https://github.com/valkey-io/valkey.git
  TEST_FRAMEWORK_REPO: https://github.com/valkey-io/valkey-test-framework
  SERVER_VERSION: unstable

jobs:
  ycsb:
    name: YCSB benchmark matrix
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read   # needed for gh run download to fetch prior artifact
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

    - name: Cache Cargo registry
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Build release module
      run: RUSTFLAGS="-D warnings" cargo build --release

    - name: Get Valkey HEAD SHA
      id: valkey-sha
      run: |
        SHA=$(git ls-remote "${{ env.VALKEY_REPO_URL }}" \
          "refs/heads/${{ env.SERVER_VERSION }}" \
          | head -1 | awk '{print $1}')
        echo "sha=$SHA" >> $GITHUB_OUTPUT

    - name: Cache Valkey server binary
      id: cache-valkey
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: tests/build/binaries/${{ env.SERVER_VERSION }}
        key: valkey-server-${{ env.SERVER_VERSION }}-${{ steps.valkey-sha.outputs.sha }}

    - name: Build valkey-server
      if: steps.cache-valkey.outputs.cache-hit != 'true'
      run: |
        mkdir -p "tests/build/binaries/${{ env.SERVER_VERSION }}"
        cd tests/build
        git clone "${{ env.VALKEY_REPO_URL }}"
        cd valkey
        git checkout ${{ env.SERVER_VERSION }}
        make -j
        cp src/valkey-server ../binaries/${{ env.SERVER_VERSION }}/
        if [ -f src/modules/lua/libvalkeylua.so ]; then
          cp src/modules/lua/libvalkeylua.so ../binaries/${{ env.SERVER_VERSION }}/
        fi

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: '3.11'

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      with:
        enable-cache: true
        cache-dependency-glob: 'uv.lock'
    - name: Install test dependencies
      run: uv sync --frozen

    - name: Set module and server paths
      run: |
        echo "MODULE_PATH=$(realpath target/release/libvalkey_flash.so)" >> $GITHUB_ENV
        echo "SERVER_BIN=$(realpath tests/build/binaries/${{ env.SERVER_VERSION }}/valkey-server)" >> $GITHUB_ENV

    - name: Download previous nightly artifact (for regression comparison)
      id: baseline
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        prev_run=$(gh run list \
          --workflow=bench-nightly.yml \
          --status=success \
          --limit=5 \
          --json databaseId \
          --jq '.[0].databaseId' 2>/dev/null || echo "")
        if [ -n "$prev_run" ] && [ "$prev_run" != "null" ]; then
          mkdir -p baseline
          gh run download "$prev_run" --name ycsb-report --dir baseline/ 2>/dev/null \
            && echo "path=baseline/ycsb-report.json" >> $GITHUB_OUTPUT \
            || echo "path=" >> $GITHUB_OUTPUT
        else
          echo "path=" >> $GITHUB_OUTPUT
        fi

    - name: Run YCSB benchmark matrix
      run: |
        baseline_arg=""
        if [ -n "${{ steps.baseline.outputs.path }}" ]; then
          baseline_arg="--baseline ${{ steps.baseline.outputs.path }}"
        fi
        uv run python3 tests/bench/ycsb.py $baseline_arg

    - name: Upload YCSB report
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: ycsb-report
        path: ycsb-report.json
        if-no-files-found: warn
