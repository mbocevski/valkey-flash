name: loom

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly Monday 03:00 UTC — loom is slow and doesn't need to run on every push.
    - cron: '0 3 * * 1'

jobs:
  loom-tests:
    name: Loom concurrency tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - name: Cache Cargo registry
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-cargo-loom-${{ hashFiles('**/Cargo.toml') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    - name: Run loom tests
      # Block scalar (not plain): the trailing `::` in the test-filter arg
      # trips YAML's plain-scalar parser ("mapping values are not allowed
      # here" — `:` followed by end-of-line closes the scalar and looks
      # like a key).
      run: |
        RUSTFLAGS='--cfg loom' cargo test --features enable-system-alloc -- loom_tests::
