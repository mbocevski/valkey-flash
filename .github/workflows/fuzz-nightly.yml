name: fuzz-nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  fuzz-extended:
    name: Fuzz extended / ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_wal_record_parser
          - fuzz_rdb_deserializer
          - fuzz_cache_ops
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
    - name: Cache Cargo registry
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    - name: Install Rust nightly
      run: rustup toolchain install nightly --no-self-update --profile minimal
    - name: Install cargo-fuzz
      run: cargo install --version =0.13.1 --locked cargo-fuzz
    - name: Run fuzz (${{ matrix.target }}, 60min)
      run: cargo +nightly fuzz run ${{ matrix.target }} -- -max_total_time=3600
    - name: Upload corpus
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
      with:
        name: fuzz-corpus-${{ matrix.target }}
        path: fuzz/corpus/${{ matrix.target }}/
        if-no-files-found: ignore
    - name: Upload crashes
      if: failure()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
      with:
        name: fuzz-crashes-${{ matrix.target }}
        path: fuzz/artifacts/${{ matrix.target }}/
        if-no-files-found: ignore
