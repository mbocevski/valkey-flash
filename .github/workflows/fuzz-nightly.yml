name: fuzz-nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  fuzz-extended:
    name: Fuzz extended / ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_wal_record_parser
          - fuzz_rdb_deserializer
          - fuzz_cache_ops
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - name: Cache Cargo registry
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    - name: Install Rust nightly
      run: rustup toolchain install nightly --no-self-update --profile minimal
    - name: Install cargo-fuzz
      run: cargo install --version =0.13.1 --locked cargo-fuzz
    - name: Run fuzz (${{ matrix.target }}, 60min)
      run: cargo +nightly fuzz run ${{ matrix.target }} -- -max_total_time=3600
    - name: Upload corpus
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: fuzz-corpus-${{ matrix.target }}
        path: fuzz/corpus/${{ matrix.target }}/
        if-no-files-found: ignore
    - name: Upload crashes
      if: failure()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: fuzz-crashes-${{ matrix.target }}
        path: fuzz/artifacts/${{ matrix.target }}/
        if-no-files-found: ignore
