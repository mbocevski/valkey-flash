[pytest]
markers =
    docker_single: marks tests that require a single-node Docker topology (set USE_DOCKER=1)
    docker_cluster: marks tests that require a cluster Docker topology (set USE_DOCKER=1)
    docker_cluster_replica_tier: marks tests that require a replica-tier-enabled cluster Docker topology (set USE_DOCKER=1)
    compaction: marks tests that exercise the background compaction path
    crash_recovery: marks tests that exercise crash recovery scenarios
    ttl_reclaim: marks tests that exercise TTL-triggered NVMe block reclaim
    slow: marks tests that take noticeably longer than the median (cluster failover, resharding-under-load, etc.)
    skip_for_asan: marks tests incompatible with ASAN runs (e.g. expected leaks or allocation-count assertions)
    flaky: marks tests re-run on failure by pytest-rerunfailures (use `@pytest.mark.flaky(reruns=N, reruns_delay=S)`)
