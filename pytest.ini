[pytest]
markers =
    docker_single: marks tests that require a single-node Docker topology (set USE_DOCKER=1)
    docker_cluster: marks tests that require a cluster Docker topology (set USE_DOCKER=1)
    compaction: marks tests that exercise the background compaction path
    crash_recovery: marks tests that exercise crash recovery scenarios
    ttl_reclaim: marks tests that exercise TTL-triggered NVMe block reclaim
